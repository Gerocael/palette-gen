name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: python -m py_compile main.py palette_service.py pigment_data.py pigment_analysis.py
      - name: Import check
        env:
          ANTHROPIC_API_KEY: dummy-key-for-ci
        run: python -c "import main"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check inline script in index.html
        run: |
          perl -0777 -ne 'if (/<script>(.*)<\/script>/s) { print $1; }' index.html > /tmp/inline.js
          node --check /tmp/inline.js
